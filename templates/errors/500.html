{% extends "base.html" %}
{% block title %}Server Error{% endblock %}
{% block content %}
<div class="text-center py-5">
  <p class="display-6 text-muted fw-light">500</p>
  <h1 class="h4 mb-3">Internal server error</h1>
  <p class="text-muted mb-4">
    Something went wrong on our end.<br>
    Please try again, or contact the administrator if the problem persists.
  </p>
  <a href="{{ url_for('search.index') }}" class="btn btn-primary">
    <i class="bi bi-search me-1"></i>Back to Search
  </a>
</div>
{% endblock %}
