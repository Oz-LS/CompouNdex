{% extends "base.html" %}
{% block title %}Error {{ code }}{% endblock %}
{% block content %}
<div class="text-center py-5">
  <p class="display-6 text-muted fw-light">{{ code }}</p>
  <h1 class="h4 mb-3">{{ title }}</h1>
  <p class="text-muted mb-4">{{ message }}</p>
  <a href="{{ url_for('search.index') }}" class="btn btn-primary">
    <i class="bi bi-search me-1"></i>Back to Search
  </a>
</div>
{% endblock %}
